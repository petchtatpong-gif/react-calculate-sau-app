<!doctype html>
<html lang="th">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap Grid & Modal Example</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <div class="container my-5">
        
        <h2 class="text-center mb-4">ตัวอย่าง Grid System และ Modal</h2>

        <div class="row g-4">
            
            <div class="col-12 col-md-4">
                <div class="card h-100 border-primary">
                    <div class="card-body text-center">
                        <h5 class="card-title">สินค้าชิ้นที่ 1</h5>
                        <p class="card-text">ตัวอย่างการจัดวางด้วย Grid Column 1</p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#demoModal">
                            เปิดรายละเอียด
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card h-100 border-success">
                    <div class="card-body text-center">
                        <h5 class="card-title">สินค้าชิ้นที่ 2</h5>
                        <p class="card-text">ตัวอย่างการจัดวางด้วย Grid Column 2</p>
                        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#demoModal">
                            เปิดรายละเอียด
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card h-100 border-warning">
                    <div class="card-body text-center">
                        <h5 class="card-title">สินค้าชิ้นที่ 3</h5>
                        <p class="card-text">ตัวอย่างการจัดวางด้วย Grid Column 3</p>
                        <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#demoModal">
                            เปิดรายละเอียด
                        </button>
                    </div>
                </div>
            </div>

        </div>
        </div>

    <div class="modal fade" id="demoModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"> <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="exampleModalLabel">รายละเอียดเพิ่มเติม</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>นี่คือเนื้อหาภายใน Modal...</p>
                    <p class="text-muted">คุณสามารถใส่ฟอร์ม รูปภาพ หรือข้อความยาวๆ ได้ที่นี่</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ปิด</button>
                    <button type="button" class="btn btn-primary">บันทึกข้อมูล</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
