<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มลงทะเบียน (Bootstrap 5)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .form-container {
            max-width: 600px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2 class="text-center mb-4">ลงทะเบียนสมาชิก</h2>
        
        <form class="row g-3 needs-validation" novalidate id="registrationForm">
            
            <div class="col-12">
                <label for="email" class="form-label">อีเมล (Email)</label>
                <input type="email" class="form-control" id="email" required>
                <div class="invalid-feedback">
                    กรุณากรอกอีเมลให้ถูกต้อง
                </div>
            </div>

            <div class="col-md-6">
                <label for="password" class="form-label">รหัสผ่าน (Password)</label>
                <input type="password" class="form-control" id="password" required>
                <div class="invalid-feedback">
                    กรุณากำหนดรหัสผ่าน
                </div>
            </div>

            <div class="col-md-6">
                <label for="confirmPassword" class="form-label">ยืนยันรหัสผ่าน (Confirm Password)</label>
                <input type="password" class="form-control" id="confirmPassword" required>
                <div class="invalid-feedback" id="confirmPasswordFeedback">
                    กรุณายืนยันรหัสผ่าน
                </div>
            </div>

            <div class="col-12">
                <label class="form-label d-block">เพศ (Gender)</label>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderMale" value="male" required>
                    <label class="form-check-label" for="genderMale">ชาย</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderFemale" value="female" required>
                    <label class="form-check-label" for="genderFemale">หญิง</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="genderOther" value="other" required>
                    <label class="form-check-label" for="genderOther">อื่นๆ</label>
                </div>
                <div class="invalid-feedback">กรุณาระบุเพศ</div> </div>

            <div class="col-12">
                <label for="birthdate" class="form-label">วันเกิด (Birthdate)</label>
                <input type="date" class="form-control" id="birthdate" required>
                <div class="invalid-feedback">
                    กรุณาระบุวันเกิด
                </div>
            </div>

            <div class="col-12">
                <label for="address" class="form-label">ที่อยู่ (Address)</label>
                <textarea class="form-control" id="address" rows="3" required></textarea>
                <div class="invalid-feedback">
                    กรุณากรอกที่อยู่
                </div>
            </div>

            <div class="col-12">
                <label for="hobby" class="form-label">งานอดิเรก (Hobby)</label>
                <select class="form-select" id="hobby" required>
                    <option selected disabled value="">เลือกงานอดิเรก...</option>
                    <option value="reading">อ่านหนังสือ</option>
                    <option value="gaming">เล่นเกม</option>
                    <option value="sports">เล่นกีฬา</option>
                    <option value="music">ฟังเพลง/เล่นดนตรี</option>
                    <option value="travel">ท่องเที่ยว</option>
                </select>
                <div class="invalid-feedback">
                    กรุณาเลือกงานอดิเรก
                </div>
            </div>

            <div class="col-12 mt-4">
                <button class="btn btn-primary w-100" type="submit">ลงทะเบียน</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    (function () {
        'use strict'

        // ดึงฟอร์มที่มี class 'needs-validation' มาทั้งหมด
        var forms = document.querySelectorAll('.needs-validation')

        // วนลูปเพื่อดักจับเหตุการณ์ Submit
        Array.prototype.slice.call(forms)
            .forEach(function (form) {
                form.addEventListener('submit', function (event) {
                    
                    // --- เพิ่มเติม: ตรวจสอบว่า Password ตรงกันหรือไม่ ---
                    var password = document.getElementById('password');
                    var confirmPassword = document.getElementById('confirmPassword');
                    var confirmFeedback = document.getElementById('confirmPasswordFeedback');

                    if (password.value !== confirmPassword.value && confirmPassword.value !== "") {
                        confirmPassword.setCustomValidity("Passwords do not match");
                        confirmFeedback.textContent = "รหัสผ่านไม่ตรงกัน";
                    } else {
                        confirmPassword.setCustomValidity(""); // รีเซ็ตค่าถ้าตรงกันแล้ว
                        confirmFeedback.textContent = "กรุณายืนยันรหัสผ่าน";
                    }
                    // ---------------------------------------------

                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }

                    form.classList.add('was-validated')
                }, false)
            })
    })()
</script>

</body>
</html>
