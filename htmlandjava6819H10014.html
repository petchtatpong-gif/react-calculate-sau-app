<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript #1: Calculate VAT</title>
</head>
<body>

    <h1>โปรแกรมคำนวณ VAT 7%</h1>

    <div style="margin-bottom: 20px;">
        <label for="price">ราคาสินค้า:</label>
        <input type="number" id="price" placeholder="ระบุราคา...">
        <button id="btnCalVat">คำนวณ</button>
    </div>

    <h3 id="msg">ผลลัพธ์จะแสดงที่นี่</h3>

    <script>
        // 1. กำหนดค่าคงที่
        const VAT_RATE = 0.07;

        // 2. อ้างอิง Element จาก HTML เก็บไว้ในตัวแปร
        const inputPrice = document.getElementById('price');
        const btnCalVat = document.getElementById('btnCalVat');
        const msgDisplay = document.getElementById('msg');

        // 3. ฟังก์ชันทำงานเมื่อกดปุ่ม
        btnCalVat.addEventListener("click", () => {
            // รับค่าจาก input และแปลงเป็นตัวเลข
            const price = Number(inputPrice.value);

            // ตรวจสอบว่าค่าที่ใส่มาถูกต้องหรือไม่ (กัน Error)
            if (!price) {
                msgDisplay.textContent = "กรุณาระบุราคาให้ถูกต้อง";
                msgDisplay.style.color = "red";
                return;
            }

            // คำนวณและแสดงผล
            const totalVat = price * VAT_RATE;
            
            // แสดงผลลัพธ์ (ใช้ toFixed(2) เพื่อปัดทศนิยม 2 ตำแหน่ง)
            msgDisplay.textContent = "VAT: " + totalVat.toFixed(2) + " บาท";
            msgDisplay.style.color = "black";
        });
    </script>

</body>
</html>
